---
# Non-secret defaults. Terraform overrides these at deploy time via
# `-e @vars.json` (the ansible_extra_vars output), which has higher precedence;
# these values only fill gaps so templates never hit an undefined variable.
# Keep in sync with deployment/variables.tf defaults. Secret values are NOT
# here — they come from the ansible-vault file delivered by cloud-init and are
# loaded into the `secrets` namespace by the playbook.

# SSH login user for the Lightsail Debian 12 image.
ansible_user: admin

# Operator SSH public keys, added to the admin user's authorized_keys by the
# playbook — NOT via Terraform user_data, which is ForceNew and would destroy
# and rebuild the VM on any change. Managing them here means a key add/remove is
# just a playbook re-run against the live host. Public keys are non-secret, so
# they live in plain group_vars rather than the vault. Source:
# https://github.com/0xinterface.keys
operator_authorized_keys:
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIO3XtOQIWQXzJBMwKZAHj+CdStqUfLqTn80zoIYHqpMY"
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL4hoqAr76JwTIlUXjR1kMeIfRifij65hBN5vlK7bfco"
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHPK+bR2JIzK43k8rGILOlJ07YaymhHoXcpjR69ngqoC"
  - "ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBG2h8OBT7O/X4jmyfKfODDrl84cjpcjbC7Ge3B4eoJf0EgVSqHjl7TK8MojnxjivoQl7kZGNHeoMJ/jUqSJqGW4="
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDUbBDuFv15fsHPXYgYDM4Ey/EW/lJoTzJtfvxdQ26X2" # Daniel's MacBook Air

# Container images.
docker_image_backend: ghcr.io/sight-hkust/haputele-backend:latest
docker_image_frontend: ghcr.io/sight-hkust/haputele-frontend:latest

# Public-facing.
domain: haputele.sightprojects.app
LIVEKIT_URL: wss://haputele.sightprojects.app/livekit
FRONTEND_BASE_URL: https://haputele.sightprojects.app

# Database (password/DSN are secret — see vault).
POSTGRES_DB: haputele
POSTGRES_USER: hapu

# Auth.
JWT_ALG: HS256
JWT_EXPIRE_MIN: "480"
COOKIE_SECURE: "true"
COOKIE_SAMESITE: lax
COOKIE_DOMAIN: ""
CORS_ALLOW_ORIGINS: ""
MASTER_CONSENT_VERSION: v1

# App.
APP_TIMEZONE: Asia/Colombo
DOCTOR_INVITE_TTL_HOURS: "72"

# Object storage (endpoint/bucket/keys are secret — see vault).
S3_REGION: auto
S3_FORCE_PATH_STYLE: "true"

# Email (api key + webhook secret are secret — see vault). RESEND_FROM must be
# on a Resend-verified domain; empty disables email. Reply-To stays empty (no
# Reply-To header on no-reply transactional mail).
RESEND_FROM: noreply@haputele.sightprojects.app
RESEND_REPLY_TO: ""

# Frontend (NEXT_PUBLIC_* are inlined at image build time; passed for parity).
NEXT_PUBLIC_API_URL: ""
NEXT_PUBLIC_APP_TIMEZONE: Asia/Colombo
