[defaults]
# Fresh VMs have no entry in known_hosts; skip the prompt in CI.
host_key_checking = False
retry_files_enabled = False
# Pretty multi-line task output without depending on the community.general
# `yaml` stdout callback (not bundled in ansible-core, which is all CI installs).
callback_result_format = yaml
interpreter_python = auto_silent

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null
