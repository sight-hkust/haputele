name: Deployment

on:
  workflow_dispatch:
    inputs:
      intent:
        type: choice
        description: "Intent of running Terraform workflow"
        default: plan
        options:
          - plan
          - apply
          - destroy
          - unlock
      lock_id:
        type: string
        description: "State lock ID to release (required when intent = unlock)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

# Serialize Deployment runs so two of them can't race for the Terraform state
# lock. Queue rather than cancel — cancelling a run mid-apply is exactly what
# leaves a stale lock behind.
concurrency:
  group: deploy-terraform
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Run Terraform
    defaults:
      run:
        working-directory: deployment
    env:
      # Used by Terraform (data.external.vault encrypts the secrets file) and by
      # the Ansible step (decrypts it). data.external runs during plan too, so
      # this must be present for every Terraform invocation.
      TF_VAR_ansible_vault_password: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Authenticate to Security Token Service
        uses: hkust-contrib/actions/authenticate@latest
        with:
          scope: aws sops:age_keypair

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/LightsailProvisioner
          aws-region: ap-south-1

      # ansible-vault + jq back the Terraform external data source (vault.tf);
      # ansible-playbook runs the post-apply provisioning. jq ships on the runner.
      - name: Install Ansible
        run: |
          # pipx avoids PEP-668 "externally-managed-environment" failures from
          # pip on the runner's system Python; it's preinstalled on ubuntu-latest.
          pipx install ansible-core
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup Terraform
        uses: hkust-contrib/actions/setup-terraform@latest
        with:
          use_federated_token: true
          state: projects/haputele

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # Release a stale state lock left by a cancelled/crashed run. Only removes
      # the lock; does not touch state. Pass the lock ID from the error message
      # as the `lock_id` input. Make sure no Deployment run is actually active.
      - name: Terraform Force Unlock
        if: github.event.inputs.intent == 'unlock'
        run: |
          if [ -z "${{ github.event.inputs.lock_id }}" ]; then
            echo "::error::intent=unlock requires the 'lock_id' input." >&2
            exit 1
          fi
          terraform force-unlock -force "${{ github.event.inputs.lock_id }}"

      - name: Terraform Plan
        id: plan
        if: github.event.inputs.intent == 'plan'
        run: terraform plan -no-color

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event.inputs.intent == 'apply'
        run: terraform apply -auto-approve

      # --- Provision the VM with Ansible (apply only) ---
      - name: Wait for VM SSH + cloud-init
        if: github.ref == 'refs/heads/main' && github.event.inputs.intent == 'apply'
        run: |
          IP="$(terraform output -raw vm_public_ip)"
          terraform output -raw ssh_private_key > ssh_key
          chmod 600 ssh_key
          for i in $(seq 1 60); do
            if ssh -i ssh_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
                 -o ConnectTimeout=5 "admin@${IP}" 'test -f /etc/haputele/vault.yml'; then
              echo "VM ready (cloud-init wrote the vault file)."
              exit 0
            fi
            echo "Waiting for VM ${IP} ($i/60)..."
            sleep 10
          done
          echo "VM did not become ready in time." >&2
          exit 1

      - name: Run Ansible playbook
        if: github.ref == 'refs/heads/main' && github.event.inputs.intent == 'apply'
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/deployment/ansible/ansible.cfg
        run: |
          IP="$(terraform output -raw vm_public_ip)"
          terraform output -raw ansible_extra_vars > vars.json
          printf '%s' '${{ secrets.ANSIBLE_VAULT_PASSWORD }}' > vaultpass
          printf '[haputele]\n%s\n' "$IP" > inventory.ini
          ansible-playbook -i inventory.ini ansible/playbook.yml \
            --private-key ssh_key \
            --vault-password-file vaultpass \
            -e @vars.json
          rm -f vaultpass ssh_key

      - name: Terraform Destroy
        if: github.ref == 'refs/heads/main' && github.event.inputs.intent == 'destroy'
        run: terraform destroy -auto-approve
