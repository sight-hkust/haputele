services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-haputele}
      POSTGRES_USER: ${POSTGRES_USER:-hapu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hapu}
      TZ: ${APP_TIMEZONE:-Asia/Colombo}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-hapu} -d $${POSTGRES_DB:-haputele}"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  # S3-compatible object store for blobs (signatures, rubber stamps, HW
  # attachments). Mirrors the prod S3 endpoint so the same code paths run
  # locally. Console at http://localhost:9001 (login with the access/secret
  # keys below). The api auto-creates the bucket on startup (see
  # services/storage.py:ensure_bucket).
  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY:-rustfsadmin}
      RUSTFS_OBS_LOGGER_LEVEL: warn
    volumes:
      - rustfs_data:/data
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # Local self-hosted LiveKit is disabled — using LiveKit Cloud instead (see
  # LIVEKIT_URL in .env). Re-enable this block to switch back to self-hosted.
  # livekit:
  #   image: livekit/livekit-server:latest
  #   restart: unless-stopped
  #   command: --dev --bind 0.0.0.0
  #   environment:
  #     LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecret-must-be-at-least-32-chars-long}"
  #     NODE_IP: ${LIVEKIT_NODE_IP:-127.0.0.1}
  #   ports:
  #     - "7880:7880"
  #     - "7881:7881"
  #     - "7882:7882/udp"

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-hapu}:${POSTGRES_PASSWORD:-hapu}@db:5432/${POSTGRES_DB:-haputele}
      DB_HOST: db
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_ALG: ${JWT_ALG:-HS256}
      JWT_EXPIRE_MIN: ${JWT_EXPIRE_MIN:-480}
      MASTER_CONSENT_VERSION: ${MASTER_CONSENT_VERSION:-v1}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Colombo}
      TZ: ${APP_TIMEZONE:-Asia/Colombo}
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      # Object storage. In compose the api talks to rustfs over the
      # internal network (http://rustfs:9000); override S3_ENDPOINT_URL to
      # point at real S3 in prod. S3_FORCE_PATH_STYLE must stay true for
      # rustfs/minio/most non-AWS endpoints.
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://rustfs:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-haputele}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-rustfsadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-rustfsadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
    volumes:
      # Persists the plaintext setup-token file across container restarts.
      # `docker compose down -v` clears it (same volume lifecycle as db_data).
      - api_data:/data
    depends_on:
      db:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* must be present at build time — Next inlines them into
        # the client bundle. Empty here means the client uses the relative
        # "/api" prefix and Next.js's rewrite proxies to the api container,
        # so the bundle works on any hostname (localhost, LAN, tunnel, prod).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL-}
        NEXT_PUBLIC_APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Colombo}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL-}
      NEXT_PUBLIC_APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Colombo}
      TZ: ${APP_TIMEZONE:-Asia/Colombo}
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  db_data:
  api_data:
  rustfs_data:
